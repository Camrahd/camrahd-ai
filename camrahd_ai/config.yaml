

llm:
 provider: openai        # openai | anthropic | ollama
 model: gpt-5.5
 # base_url: http://localhost:11434   # only used by ollama


embeddings:
 provider: openai        # openai | huggingface | ollama
 model: text-embedding-3-small


chromadb:
 persist_dir: .camrahd/chromadb/
 collection_name: codebase

qdrant:
 collection_name: sample_project2

rag:
 mode: hybrid           # semantic | hybrid


vector_store:
 provider: qdrant
 retrieval_mode: hybrid  # dense | sparse | hybrid

memory:
 db_path: .camrahd/memory/memory.db
 summarize_at_tokens: 4000
 keep_last_messages: 20


elasticsearch:
 url: http://localhost:9200
 index_name: codebase


skills:
 skills_dir: .camrahd/skills


tools:
 require_approval: true   # ask before the agent runs shell commands or writes/deletes files


logging:
 file: .camrahd/camrahd.log
 level: DEBUG             # level written to the log file for camrahd loggers

